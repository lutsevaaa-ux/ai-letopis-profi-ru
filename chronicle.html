<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-летопись Профи.ру</title>
  <link rel="stylesheet" href="./chronicle.css?v=20260702d">
</head>
<body>
  <main class="stage">
    <div class="rod" aria-hidden="true"></div>

    <section class="shell">
      <section class="hero panel panel-hero">
        <div class="hero-kicker" id="project-name"></div>
        <h1 id="headline"></h1>
      </section>

      <section class="controls panel" aria-label="Фильтры летописи">
        <div class="filter-grid">
          <label class="filter-field">
            <span class="filter-label">Месяц</span>
            <select id="month-filter"></select>
          </label>
          <label class="filter-field">
            <span class="filter-label">Тип события</span>
            <select id="type-filter"></select>
          </label>
        </div>
      </section>

      <section class="news-sheet">
        <section class="sheet-intro">
          <div class="sheet-kicker">Редакция летописи</div>
          <h2>Главные вести сезона на одном пергаменте</h2>
        </section>

        <section class="stats" aria-label="Сводка хроники">
          <article class="stat">
            <strong id="stat-months">0</strong>
            <span>месяцев в летописи</span>
          </article>
          <article class="stat">
            <strong id="stat-events">0</strong>
            <span>событий на пергаменте</span>
          </article>
          <article class="stat">
            <strong id="stat-images">0</strong>
            <span>карточек с иллюстрацией</span>
          </article>
          <article class="stat">
            <strong id="stat-sources">0</strong>
            <span>ссылок на исходные треды</span>
          </article>
        </section>

        <section class="timeline" id="timeline" aria-live="polite"></section>

        <section class="footer-note panel">
          <p id="footer-note"></p>
        </section>
      </section>
    </section>

    <div class="rod" aria-hidden="true"></div>
  </main>

  <script type="module" src="./chronicle.js?v=20260702d"></script>
</body>
</html>
